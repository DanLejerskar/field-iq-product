<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Step 4: Stop the equipment">
  <rect width="800" height="600" fill="#1E2761"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#CADCFC" stroke-width="2" rx="8"/>
  <text x="50" y="90" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#CADCFC" letter-spacing="4">STEP 4</text>
  <text x="50" y="540" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#F5F1EA" letter-spacing="2">STOP THE EQUIPMENT</text>
  <text x="50" y="580" font-family="Inter, monospace" font-size="11" font-weight="500" fill="#6B7689" letter-spacing="1.5">REFERENCE · DAC #811 · GENESIS-RENDERED</text>

  <!-- Starter enclosure close-up -->
  <g transform="translate(220 160)">
    <rect width="360" height="280" fill="#6B7689" stroke="#CADCFC" stroke-width="4" rx="6"/>
    <text x="180" y="40" font-family="Inter, monospace" font-size="16" fill="#F5F1EA" text-anchor="middle">LOCAL MANUAL STARTER</text>

    <!-- START button (dim) -->
    <circle cx="120" cy="140" r="50" fill="#10B981" opacity="0.35" stroke="#F5F1EA" stroke-width="3"/>
    <circle cx="120" cy="140" r="35" fill="#10B981" opacity="0.4"/>
    <text x="120" y="146" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0B1424" text-anchor="middle">START</text>

    <!-- STOP button (bright, depressed) -->
    <circle cx="240" cy="140" r="55" fill="#E0625C" stroke="#F5F1EA" stroke-width="3"/>
    <circle cx="240" cy="140" r="40" fill="#B53D38"/>
    <text x="240" y="148" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#F5F1EA" text-anchor="middle">STOP</text>

    <!-- Indicator label -->
    <rect x="80" y="220" width="200" height="32" fill="#1E2761" stroke="#CADCFC"/>
    <text x="180" y="241" font-family="Inter, monospace" font-size="13" fill="#E0625C" text-anchor="middle">● STOPPED</text>
  </g>

  <text x="400" y="490" font-family="Inter, sans-serif" font-size="16" fill="#A6AFC2" text-anchor="middle">Press the STOP button; confirm OFF indicator</text>
</svg>
