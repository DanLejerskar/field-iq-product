<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Step 5: Open disconnect (animated)">
  <rect width="800" height="600" fill="#1E2761"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#CADCFC" stroke-width="2" rx="8"/>
  <text x="50" y="90" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#CADCFC" letter-spacing="4">STEP 5</text>
  <text x="50" y="540" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#F5F1EA" letter-spacing="2">OPEN DISCONNECT</text>
  <text x="50" y="580" font-family="Inter, monospace" font-size="11" font-weight="500" fill="#6B7689" letter-spacing="1.5">REFERENCE · DAC #811 · GENESIS-RENDERED</text>

  <!-- Disconnect box close-up -->
  <g transform="translate(280 150)">
    <rect width="240" height="320" fill="#808080" stroke="#CADCFC" stroke-width="4" rx="6"/>
    <rect x="30" y="30" width="180" height="180" fill="#6B7689" stroke="#404040" stroke-width="2"/>
    <text x="120" y="130" font-family="Inter, monospace" font-size="14" fill="#F5F1EA" text-anchor="middle">FUSED</text>
    <text x="120" y="148" font-family="Inter, monospace" font-size="14" fill="#F5F1EA" text-anchor="middle">DISCONNECT</text>
    <!-- ON/OFF labels -->
    <text x="150" y="245" font-family="Inter, monospace" font-size="11" fill="#A6AFC2" text-anchor="end">ON ▲</text>
    <text x="150" y="295" font-family="Inter, monospace" font-size="11" fill="#F0B23A" text-anchor="end">OFF ▼</text>

    <!-- Handle pivot at (170, 260); the handle rotates from -90deg (UP/ON) to 0deg (DOWN/OFF) over 1.5s, then holds. -->
    <g transform="translate(170 260)">
      <circle r="8" fill="#CADCFC"/>
      <g>
        <rect x="-12" y="0" width="24" height="60" fill="#B85042" stroke="#F5F1EA" stroke-width="2" rx="4"/>
        <animateTransform attributeName="transform" attributeType="XML" type="rotate" values="-90;-90;0;0" keyTimes="0;0.05;0.7;1" dur="2.5s" repeatCount="indefinite" fill="freeze"/>
      </g>
    </g>
  </g>

  <text x="400" y="510" font-family="Inter, sans-serif" font-size="16" fill="#A6AFC2" text-anchor="middle">Handle rotates DOWN to OPEN/OFF</text>
</svg>
