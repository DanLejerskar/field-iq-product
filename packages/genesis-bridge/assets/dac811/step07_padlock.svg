<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Step 7: Apply padlock (animated)">
  <rect width="800" height="600" fill="#1E2761"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#CADCFC" stroke-width="2" rx="8"/>
  <text x="50" y="90" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#CADCFC" letter-spacing="4">STEP 7</text>
  <text x="50" y="540" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#F5F1EA" letter-spacing="2">APPLY PADLOCK</text>
  <text x="50" y="580" font-family="Inter, monospace" font-size="11" font-weight="500" fill="#6B7689" letter-spacing="1.5">REFERENCE · DAC #811 · GENESIS-RENDERED</text>

  <!-- Hasp behind padlock -->
  <g transform="translate(360 280)">
    <circle cx="40" cy="40" r="34" fill="#F0B23A" stroke="#1E2761" stroke-width="3"/>
    <circle cx="40" cy="40" r="9" fill="#1E2761"/>
    <text x="40" y="100" font-family="Inter, monospace" font-size="11" fill="#F0B23A" text-anchor="middle">HASP</text>
  </g>

  <!-- Padlock body (stationary) -->
  <g transform="translate(310 320)">
    <rect width="100" height="80" fill="#3A4763" stroke="#CADCFC" stroke-width="4" rx="10"/>
    <circle cx="50" cy="40" r="14" fill="#1E2761" stroke="#CADCFC" stroke-width="2"/>
    <rect x="42" y="36" width="16" height="14" fill="#CADCFC"/>
    <text x="50" y="62" font-family="Inter, monospace" font-size="10" fill="#A6AFC2" text-anchor="middle">EON</text>
  </g>

  <!-- Padlock shackle — starts up (y=-50), drops to closed (y=0) over 1s, then 0.2s color-flash, then holds. -->
  <g transform="translate(310 320)">
    <g>
      <path d="M25 0 L25 -20 Q25 -50 50 -50 Q75 -50 75 -20 L75 0" stroke="#A6AFC2" stroke-width="9" fill="none" stroke-linecap="round">
        <animate attributeName="stroke" values="#A6AFC2;#A6AFC2;#10B981;#A6AFC2;#A6AFC2" keyTimes="0;0.5;0.6;0.7;1" dur="2s" repeatCount="indefinite" fill="freeze"/>
      </path>
      <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 -40; 0 -40; 0 0; 0 0" keyTimes="0;0.05;0.5;1" dur="2s" repeatCount="indefinite" fill="freeze"/>
    </g>
  </g>

  <text x="400" y="490" font-family="Inter, sans-serif" font-size="16" fill="#A6AFC2" text-anchor="middle">Shackle clicks closed through hasp hole</text>
</svg>
