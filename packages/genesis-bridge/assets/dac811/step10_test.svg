<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Step 10: Verify zero energy">
  <rect width="800" height="600" fill="#1E2761"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#CADCFC" stroke-width="2" rx="8"/>
  <text x="50" y="90" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#CADCFC" letter-spacing="4">STEP 10</text>
  <text x="50" y="540" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#F5F1EA" letter-spacing="2">VERIFY ZERO ENERGY</text>
  <text x="50" y="580" font-family="Inter, monospace" font-size="11" font-weight="500" fill="#6B7689" letter-spacing="1.5">REFERENCE · DAC #811 · GENESIS-RENDERED</text>

  <!-- Starter close-up with finger on START -->
  <g transform="translate(220 170)">
    <rect width="360" height="280" fill="#6B7689" stroke="#CADCFC" stroke-width="4" rx="6"/>
    <text x="180" y="40" font-family="Inter, monospace" font-size="16" fill="#F5F1EA" text-anchor="middle">LOCAL MANUAL STARTER</text>

    <!-- START button (depressed) -->
    <circle cx="120" cy="140" r="55" fill="#10B981" stroke="#F5F1EA" stroke-width="3"/>
    <circle cx="120" cy="140" r="40" fill="#0E8C61"/>
    <text x="120" y="148" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#0B1424" text-anchor="middle">START</text>

    <!-- STOP button (idle) -->
    <circle cx="240" cy="140" r="50" fill="#E0625C" stroke="#F5F1EA" stroke-width="3" opacity="0.55"/>
    <text x="240" y="146" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#F5F1EA" text-anchor="middle">STOP</text>

    <!-- finger -->
    <g transform="translate(120 100)">
      <path d="M-12 -50 L-12 -2 Q-12 8 -4 8 L12 8 Q20 8 20 0 L20 -45 Q20 -55 10 -55 L0 -55 Q-12 -55 -12 -50 Z" fill="#F5F1EA" stroke="#1E2761" stroke-width="2"/>
    </g>

    <!-- Indicator -->
    <rect x="80" y="220" width="200" height="32" fill="#1E2761" stroke="#CADCFC"/>
    <text x="180" y="241" font-family="Inter, monospace" font-size="13" fill="#10B981" text-anchor="middle">● NO RESPONSE — LOTO EFFECTIVE</text>
  </g>

  <text x="400" y="490" font-family="Inter, sans-serif" font-size="16" fill="#A6AFC2" text-anchor="middle">Press START — equipment must NOT activate</text>
</svg>
