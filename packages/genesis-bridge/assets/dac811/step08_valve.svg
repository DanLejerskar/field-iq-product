<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Step 8: Close ball valve (animated)">
  <rect width="800" height="600" fill="#1E2761"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#CADCFC" stroke-width="2" rx="8"/>
  <text x="50" y="90" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#CADCFC" letter-spacing="4">STEP 8</text>
  <text x="50" y="540" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#F5F1EA" letter-spacing="2">CLOSE BALL VALVE</text>
  <text x="50" y="580" font-family="Inter, monospace" font-size="11" font-weight="500" fill="#6B7689" letter-spacing="1.5">REFERENCE · DAC #811 · GENESIS-RENDERED</text>

  <!-- Pipe (horizontal) -->
  <g transform="translate(180 320)">
    <rect width="440" height="60" fill="#A0A0A0" stroke="#CADCFC" stroke-width="3" rx="4"/>
    <line x1="0" y1="30" x2="440" y2="30" stroke="#6B7689" stroke-width="1" stroke-dasharray="6 6"/>
  </g>

  <!-- Valve body (sphere) -->
  <circle cx="400" cy="350" r="56" fill="#707070" stroke="#CADCFC" stroke-width="3"/>
  <circle cx="400" cy="350" r="38" fill="#5C6B85" stroke="#404040" stroke-width="2"/>

  <!-- Handle: starts horizontal (OPEN, 0°), rotates -90° (perpendicular = CLOSED). Pivot at (400, 350). -->
  <g transform="translate(400 350)">
    <g>
      <rect x="-12" y="-90" width="24" height="80" fill="#B85042" stroke="#F5F1EA" stroke-width="3" rx="4"/>
      <circle cx="0" cy="-90" r="10" fill="#B85042" stroke="#F5F1EA" stroke-width="2"/>
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" values="90;90;0;0" keyTimes="0;0.05;0.7;1" dur="2.5s" repeatCount="indefinite" fill="freeze"/>
    </g>
  </g>

  <!-- Position label -->
  <text x="400" y="450" font-family="Inter, monospace" font-size="13" fill="#10B981" text-anchor="middle">⟂ CLOSED</text>

  <text x="400" y="490" font-family="Inter, sans-serif" font-size="16" fill="#A6AFC2" text-anchor="middle">Rotate handle 90° — perpendicular to pipe</text>
</svg>
