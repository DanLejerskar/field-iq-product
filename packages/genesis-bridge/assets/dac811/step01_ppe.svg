  <text x="50" y="540" font-family="Inter, Trebuchet MS, sans-serif" font-size="36" font-weight="700" fill="#F5F1EA" letter-spacing="2">DON PPE</text>
  <text x="50" y="580" font-family="Inter, monospace" font-size="11" font-weight="500" fill="#6B7689" letter-spacing="1.5">REFERENCE · DAC #811 · GENESIS-RENDERED</text>

  <!-- Safety glasses -->
  <g transform="translate(400 220)">
