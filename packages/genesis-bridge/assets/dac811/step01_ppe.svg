    <path d="M-50 60 L-50 -40 Q-50 -55 -35 -55 L-35 30 L-25 30 L-25 -70 Q-25 -85 -10 -85 L-10 30 L0 30 L0 -75 Q0 -90 15 -90 L15 30 L25 30 L25 -65 Q25 -80 40 -80 L40 30 L50 30 L50 -30 Q50 -40 60 -40 L60 60 Z"/>
