<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Step 6: Apply hasp">
  <rect width="800" height="600" fill="#1E2761"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#CADCFC" stroke-width="2" rx="8"/>
  <text x="50" y="90" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#CADCFC" letter-spacing="4">STEP 6</text>
  <text x="50" y="540" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#F5F1EA" letter-spacing="2">APPLY HASP</text>
  <text x="50" y="580" font-family="Inter, monospace" font-size="11" font-weight="500" fill="#6B7689" letter-spacing="1.5">REFERENCE · DAC #811 · GENESIS-RENDERED</text>

  <!-- Disconnect body partial view (left) -->
  <g transform="translate(120 220)">
    <rect width="180" height="180" fill="#808080" stroke="#CADCFC" stroke-width="3" rx="4"/>
    <!-- handle in DOWN/OFF position -->
    <rect x="120" y="40" width="18" height="50" fill="#B85042" stroke="#F5F1EA" stroke-width="2" rx="3"/>
    <!-- lockout tab -->
    <rect x="148" y="55" width="20" height="60" fill="#404040" stroke="#CADCFC" stroke-width="2"/>
    <circle cx="158" cy="70" r="6" fill="#1E2761" stroke="#F5F1EA" stroke-width="1.5"/>
    <circle cx="158" cy="92" r="6" fill="#1E2761" stroke="#F5F1EA" stroke-width="1.5"/>
  </g>

  <!-- Hasp installed -->
  <g transform="translate(360 250)">
    <!-- jaws (scissor body) -->
    <path d="M0 40 L90 40 L120 25 L120 55 L90 80 L0 80 Z" fill="#F0B23A" stroke="#1E2761" stroke-width="3"/>
    <path d="M0 40 L0 80 L-40 80 L-40 110 L-10 110 L-10 50 L20 50 Z" fill="#F0B23A" stroke="#1E2761" stroke-width="3"/>
    <!-- multi-hole circle plate -->
    <circle cx="60" cy="60" r="34" fill="#F0B23A" stroke="#1E2761" stroke-width="3"/>
    <g fill="#1E2761">
      <circle cx="60" cy="32" r="6"/>
      <circle cx="86" cy="60" r="6"/>
      <circle cx="60" cy="88" r="6"/>
      <circle cx="34" cy="60" r="6"/>
      <circle cx="60" cy="60" r="6"/>
      <circle cx="78" cy="42" r="6"/>
      <circle cx="78" cy="78" r="6"/>
      <circle cx="42" cy="42" r="6"/>
      <circle cx="42" cy="78" r="6"/>
    </g>
    <text x="60" y="135" font-family="Inter, monospace" font-size="12" fill="#F0B23A" text-anchor="middle">LOCKOUT HASP</text>
  </g>

  <text x="400" y="490" font-family="Inter, sans-serif" font-size="16" fill="#A6AFC2" text-anchor="middle">Install hasp; handle cannot return to ON</text>
</svg>
