<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Step 9: Attach LOTO tag">
  <rect width="800" height="600" fill="#1E2761"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#CADCFC" stroke-width="2" rx="8"/>
  <text x="50" y="90" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#CADCFC" letter-spacing="4">STEP 9</text>
  <text x="50" y="540" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#F5F1EA" letter-spacing="2">ATTACH LOTO TAG</text>
  <text x="50" y="580" font-family="Inter, monospace" font-size="11" font-weight="500" fill="#6B7689" letter-spacing="1.5">REFERENCE · DAC #811 · GENESIS-RENDERED</text>

  <!-- Padlock body (with tie point) -->
  <g transform="translate(290 170)">
    <rect width="80" height="60" fill="#3A4763" stroke="#CADCFC" stroke-width="3" rx="8"/>
    <path d="M20 0 L20 -16 Q20 -36 40 -36 Q60 -36 60 -16 L60 0" stroke="#A6AFC2" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="40" cy="30" r="8" fill="#1E2761"/>
    <!-- Tag string -->
    <line x1="40" y1="60" x2="60" y2="120" stroke="#F5F1EA" stroke-width="2" stroke-dasharray="4 2"/>
  </g>

  <!-- Tag itself -->
  <g transform="translate(310 290)">
    <path d="M0 0 L180 0 L210 30 L210 220 L0 220 Z" fill="#E0625C" stroke="#F5F1EA" stroke-width="3"/>
    <!-- grommet -->
    <circle cx="190" cy="20" r="8" fill="#1E2761" stroke="#F5F1EA" stroke-width="2"/>
    <!-- header -->
    <text x="105" y="55" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#F5F1EA" text-anchor="middle">DANGER</text>
    <text x="105" y="85" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#F5F1EA" text-anchor="middle">DO NOT</text>
    <text x="105" y="108" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#F5F1EA" text-anchor="middle">OPERATE</text>
    <!-- divider -->
    <line x1="20" y1="125" x2="190" y2="125" stroke="#F5F1EA" stroke-width="2"/>
    <!-- fields -->
    <text x="20" y="150" font-family="Inter, monospace" font-size="11" fill="#F5F1EA">NAME:</text>
    <line x1="60" y1="152" x2="195" y2="152" stroke="#F5F1EA" stroke-width="1"/>
    <text x="20" y="180" font-family="Inter, monospace" font-size="11" fill="#F5F1EA">DATE:</text>
    <line x1="60" y1="182" x2="195" y2="182" stroke="#F5F1EA" stroke-width="1"/>
    <text x="20" y="208" font-family="Inter, monospace" font-size="11" fill="#F5F1EA">DEPT:</text>
    <line x1="60" y1="210" x2="195" y2="210" stroke="#F5F1EA" stroke-width="1"/>
  </g>

  <text x="400" y="500" font-family="Inter, sans-serif" font-size="16" fill="#A6AFC2" text-anchor="middle">Tag attached, warning side outward</text>
</svg>
